# ---------------------------------------------------------------------------
# Services
#   postgres      — база данных (та же схема, что в ЛР1)
#   api           — FastAPI приложение из ЛР1 (порт 8000)
#   parser        — лёгкий HTTP-сервис из ЛР2 (порт 8001)
#   redis         — брокер задач для Celery
#   celery_worker — воркер Celery, выполняет async-задачи парсинга
# ---------------------------------------------------------------------------

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: time_manager_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d time_manager_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../Lr1
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_TIME: postgresql+psycopg://postgres:postgres@postgres:5432/time_manager_db
      SECRET_KEY: ${SECRET_KEY:-super-secret-dev-key-change-in-prod}
      PARSER_SERVICE_URL: http://parser:8001
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      parser:
        condition: service_started
      redis:
        condition: service_started
    # Run Alembic migrations before starting the server
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"

  parser:
    build:
      context: ../Lr2
      dockerfile: Dockerfile.parser
    restart: unless-stopped
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  celery_worker:
    build:
      context: ../Lr1
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_TIME: postgresql+psycopg://postgres:postgres@postgres:5432/time_manager_db
      SECRET_KEY: ${SECRET_KEY:-super-secret-dev-key-change-in-prod}
      PARSER_SERVICE_URL: http://parser:8001
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      parser:
        condition: service_started
    command: celery -A celery_app worker --loglevel=info --concurrency=2

volumes:
  postgres_data:
